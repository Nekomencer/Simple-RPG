<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Dungeon RPG</title>
  <style>
    body {
      background: #0b0b0b;
      color: white;
      text-align: center;
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 10px;
    }
    h2 {
      color: #cdaa7d;
      margin: 10px 0;
    }
    canvas {
      border: 2px solid #888;
      background: #000;
      image-rendering: pixelated;
      box-shadow: 0 0 12px rgba(200,170,125,0.3);
    }
    #ui {
      margin-top: 12px;
      font-size: 1.1em;
      max-width: 640px;
      margin-left: auto;
      margin-right: auto;
    }
    #ui span {
      font-weight: bold;
      color: #ffd700;
    }
    #status {
      margin: 10px 0;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 6px;
      text-align: left;
      font-family: monospace;
      white-space: pre;
      min-height: 80px;
    }
  </style>
</head>
<body>

  <h2>Endless Dungeon RPG</h2>

  <canvas id="gameCanvas" width="640" height="640"></canvas>

  <div id="ui">
    HP: <span id="hp">100</span> / 100
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Mana: <span id="mana">50</span> / 50
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Gold: <span id="gold">25</span>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Floor: <span id="floor">1</span>
    
    <div id="status" style="margin-top: 12px;">
      Kontrol:
      • WASD / Panah = gerak & ubah arah
      • Spasi (Space) = serang melee (ke arah hadap)
      • F = tembak Magic Bolt (mana -20)
      
      Klik di canvas dulu supaya keyboard aktif!
    </div>
  </div>

  <!-- Hanya satu script yang dibutuhkan -->
  <script src="game.js"></script>

</body>
</html>
